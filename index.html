<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoundsPer | Property Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-12">

    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-blue-500">Pounds<span class="text-white">Per</span></h1>
            <div class="text-[10px] text-slate-500 uppercase tracking-widest border border-slate-700 px-2 py-1 rounded">Desktop Engine v1.2</div>
        </div>

        <div class="glass rounded-2xl p-6 mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="postcode" placeholder="Enter Postcode (e.g. SW1A 1AA)" 
                    class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-white">
                <button onclick="runPoundsPer()" id="btn"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-8 py-3 rounded-xl transition-all flex items-center justify-center disabled:opacity-50 shadow-lg shadow-blue-900/20">
                    Analyze Area
                </button>
            </div>
            <p class="text-[10px] text-slate-500 mt-4 text-center">
                Requires Proxy. If data fails: <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" class="text-blue-400 underline font-bold">ACTIVATE PROXY HERE</a>
            </p>
        </div>

        <div id="results" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass p-6 rounded-2xl text-center">
                    <span class="text-slate-400 text-xs uppercase font-bold tracking-tight">Avg £/m²</span>
                    <div id="avgPrice" class="text-4xl font-black mt-2 text-blue-400">£0</div>
                </div>
                <div class="glass p-6 rounded-2xl text-center md:col-span-2 flex items-center justify-around">
                    <div>
                        <span class="text-slate-400 text-xs uppercase font-bold">Matched Sales</span>
                        <div id="matchCount" class="text-2xl font-bold mt-1">0</div>
                    </div>
                    <div class="h-8 w-px bg-slate-700"></div>
                    <div>
                        <span class="text-slate-400 text-xs uppercase font-bold">Area Reliability</span>
                        <div id="reliability" class="text-2xl font-bold mt-1 text-green-400">Stable</div>
                    </div>
                </div>
            </div>

            <div class="glass rounded-2xl overflow-hidden shadow-2xl border border-slate-700/50">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-800/80 text-slate-400 text-xs uppercase font-black">
                        <tr>
                            <th class="px-6 py-4 tracking-widest">Property Address</th>
                            <th class="px-6 py-4 tracking-widest">Price Paid</th>
                            <th class="px-6 py-4 tracking-widest text-right">Value/m²</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>

        <div id="status" class="mt-6 text-center text-slate-400 text-sm italic font-light"></div>
    </div>

    <script>
        const EPC_AUTH = "sidehustlesallam@gmail.com:8e8bcb44ea70c2ca63b3116dd63a1a307ba3159d";
        const PROXY = "https://cors-anywhere.herokuapp.com/";

        async function runPoundsPer() {
            const input = document.getElementById('postcode').value.toUpperCase().trim();
            if (!input) return;

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            
            btn.disabled = true;
            status.innerHTML = `<span class="animate-pulse">Connecting to Land Registry...</span>`;
            results.classList.add('hidden');

            try {
                // 1. Fetch Land Registry Data (Newer, cleaner API endpoint)
                const lrUrl = `https://landregistry.data.gov.uk/data/ppi/address.json?postcode=${encodeURIComponent(input)}&_limit=25`;
                const lrRes = await fetch(PROXY + lrUrl);
                
                if (lrRes.status === 403 || lrRes.status === 404) throw new Error("Proxy access needed. Click the blue link above.");
                
                const lrData = await lrRes.json();
                const sales = lrData.result.items;

                // 2. Fetch EPC Data
                const epcRes = await fetch(`https://epc.opendatacommunities.org/api/v1/domestic/search?postcode=${input.replace(/\s/g, '')}`, {
                    headers: { "Authorization": "Basic " + btoa(EPC_AUTH), "Accept": "application/json" }
                });
                const epcData = await epcRes.json();
                const epcs = epcData.rows;

                let totalSqmPrice = 0, matchCount = 0, tableHtml = "";

                sales.forEach(property => {
                    // Check if property has a latest transaction
                    const latestTx = property.latestTransaction;
                    if (!latestTx) return;

                    const price = latestTx.pricePaid;
                    const addrLine = (property.paon || "") + " " + (property.street || "");
                    const houseNum = (property.paon || "").toUpperCase();
                    
                    // Match by House Number/Name
                    const epcMatch = epcs.find(e => e.address.toUpperCase().includes(houseNum));

                    if (epcMatch && parseFloat(epcMatch['total-floor-area']) > 0) {
                        const area = parseFloat(epcMatch['total-floor-area']);
                        const sqmPrice = Math.round(price / area);
                        totalSqmPrice += sqmPrice;
                        matchCount++;

                        tableHtml += `
                            <tr class="hover:bg-blue-900/10 transition-colors border-b border-slate-800/50">
                                <td class="px-6 py-5 font-medium text-slate-100">${addrLine}</td>
                                <td class="px-6 py-5 text-slate-400 italic">£${price.toLocaleString()}</td>
                                <td class="px-6 py-5 text-blue-400 font-black text-right">£${sqmPrice.toLocaleString()}</td>
                            </tr>`;
                    }
                });

                if (matchCount > 0) {
                    document.getElementById('avgPrice').innerText = `£${Math.round(totalSqmPrice / matchCount).toLocaleString()}`;
                    document.getElementById('matchCount').innerText = matchCount;
                    document.getElementById('tableBody').innerHTML = tableHtml;
                    results.classList.remove('hidden');
                    status.innerText = "";
                } else {
                    status.innerHTML = `<span class="text-orange-400 uppercase text-xs font-bold tracking-widest">Postcode Active but no Area matches found. Try an adjacent postcode.</span>`;
                }

            } catch (err) {
                status.innerHTML = `<div class="bg-red-900/20 p-4 rounded-xl border border-red-900/50">
                    <p class="text-red-400 font-bold mb-2">ERROR: ${err.message}</p>
                    <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" class="text-blue-400 underline font-bold">CLICK HERE TO FIX (ACTIVATE PROXY)</a>
                </div>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
