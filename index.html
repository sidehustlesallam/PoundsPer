<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>£Per | Property Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .history-item:hover { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-8">
        
        <div class="w-full md:w-64 space-y-4">
            <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 px-2">History</h2>
            <div id="historyList" class="space-y-2">
                <p class="text-xs text-slate-600 px-2 italic text-center py-4 border border-dashed border-slate-800 rounded-xl">Empty</p>
            </div>
        </div>

        <div class="flex-1">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-5xl font-black tracking-tighter text-blue-500 italic">£Per</h1>
                <div class="text-[10px] text-slate-500 uppercase tracking-widest border border-slate-700 px-2 py-1 rounded font-bold">V8.1 Direct-Access</div>
            </div>

            <div class="glass rounded-3xl p-6 mb-8 shadow-2xl">
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="postcode" placeholder="ENTER POSTCODE" 
                        onkeydown="if(event.key === 'Enter') runPoundsPer()"
                        class="flex-1 bg-slate-900 border border-slate-700 rounded-2xl px-6 py-4 text-xl outline-none text-white placeholder-slate-600 uppercase font-bold">
                    <button onclick="runPoundsPer()" id="btn"
                        class="bg-blue-600 hover:bg-blue-500 text-white font-black px-12 py-4 rounded-2xl transition-all disabled:opacity-50">
                        ANALYZE
                    </button>
                </div>
                <div id="status" class="text-xs text-slate-500 mt-4 font-medium flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-slate-700" id="statusDot"></span>
                    <span id="statusText">System Ready</span>
                </div>
            </div>

            <div id="results" class="hidden space-y-6 animate-in fade-in duration-700">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass p-8 rounded-3xl text-center border-b-4 border-b-blue-600">
                        <span class="text-slate-400 text-[10px] uppercase font-black tracking-widest">Avg Value</span>
                        <div id="avgPrice" class="text-5xl font-black mt-2 text-white">£0</div>
                        <div class="text-blue-500 text-[10px] font-bold mt-1 uppercase">Per Sq Metre</div>
                    </div>
                    
                    <div class="glass p-8 rounded-3xl md:col-span-2 flex flex-col justify-center px-10">
                        <div class="flex justify-between items-end mb-4">
                            <span class="text-slate-400 text-[10px] uppercase font-black">Matched Records</span>
                            <span id="matchCount" class="text-2xl font-black text-white">0</span>
                        </div>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div id="matchBar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="glass rounded-3xl overflow-hidden shadow-2xl border border-slate-700/50">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-800/80 text-slate-500 text-[10px] uppercase font-black">
                            <tr>
                                <th class="px-8 py-5">Property Address</th>
                                <th class="px-8 py-5">Sold Price</th>
                                <th class="px-8 py-5 text-right text-blue-400">Value/m²</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-800/50 text-slate-300"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. UPDATE THIS LINK
        const PROXY_URL = "https://lingering-snow-ccff.sidehustlesallam.workers.dev/"; 
        const EPC_AUTH = "sidehustlesallam@gmail.com:8e8bcb44ea70c2ca63b3116dd63a1a307ba3159d";
        let history = [];

        function updateHistoryUI(pc, avg) {
            if (!history.find(h => h.pc === pc)) {
                history.unshift({ pc, avg });
                if (history.length > 8) history.pop();
            }
            document.getElementById('historyList').innerHTML = history.map(h => `
                <div class="glass border border-slate-800 p-3 rounded-xl history-item transition-all cursor-pointer flex justify-between items-center" onclick="document.getElementById('postcode').value='${h.pc}'; runPoundsPer();">
                    <span class="font-bold text-sm text-slate-300">${h.pc}</span>
                    <span class="text-blue-500 font-black text-xs">£${h.avg.toLocaleString()}</span>
                </div>
            `).join('');
        }

        async function runPoundsPer() {
            const input = document.getElementById('postcode').value.toUpperCase().trim();
            if (!input) return;

            const btn = document.getElementById('btn');
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            const results = document.getElementById('results');
            
            btn.disabled = true;
            statusText.innerText = "Routing request through Cloudflare...";
            statusDot.className = "w-2 h-2 rounded-full bg-blue-500 animate-ping";
            results.classList.add('hidden');

            try {
                // Fetch Land Registry
                const lrTarget = `https://landregistry.data.gov.uk/data/ppi/address.json?postcode=${encodeURIComponent(input)}&_limit=25`;
                const lrRes = await fetch(`${PROXY_URL}?url=${encodeURIComponent(lrTarget)}`);
                const lrText = await lrRes.text();

                if (lrText.trim().startsWith('<')) {
                    throw new Error("Security challenge detected. Please try again in 15 seconds.");
                }

                const lrData = JSON.parse(lrText);
                const sales = lrData.result.items;

                // Fetch EPC
                const epcTarget = `https://epc.opendatacommunities.org/api/v1/domestic/search?postcode=${input.replace(/\s/g, '')}`;
                const epcRes = await fetch(`${PROXY_URL}?url=${encodeURIComponent(epcTarget)}`, {
                    headers: { "Authorization": "Basic " + btoa(EPC_AUTH) }
                });
                const epcData = await epcRes.json();
                const epcs = epcData.rows;

                let totalSqmPrice = 0, matchCount = 0, tableHtml = "";

                sales.forEach(property => {
                    const lastTx = property.latestTransaction;
                    if (!lastTx) return;

                    const price = lastTx.pricePaid;
                    const paon = property.paon || "";
                    const street = property.street || "";
                    
                    const epc = epcs.find(e => e.address.toUpperCase().includes(paon.toUpperCase()));

                    if (epc && parseFloat(epc['total-floor-area']) > 0) {
                        const area = parseFloat(epc['total-floor-area']);
                        const sqmPrice = Math.round(price / area);
                        totalSqmPrice += sqmPrice;
                        matchCount++;
                        tableHtml += `
                            <tr class="hover:bg-blue-500/5 transition-colors border-b border-slate-800/50">
                                <td class="px-8 py-5 font-semibold text-slate-100">${paon} ${street}</td>
                                <td class="px-8 py-5 text-slate-500 italic">£${price.toLocaleString()}</td>
                                <td class="px-8 py-5 text-blue-500 font-black text-right">£${sqmPrice.toLocaleString()}</td>
                            </tr>`;
                    }
                });

                if (matchCount > 0) {
                    const avg = Math.round(totalSqmPrice / matchCount);
                    document.getElementById('avgPrice').innerText = `£${avg.toLocaleString()}`;
                    document.getElementById('matchCount').innerText = matchCount;
                    document.getElementById('matchBar').style.width = "100%";
                    document.getElementById('tableBody').innerHTML = tableHtml;
                    results.classList.remove('hidden');
                    statusText.innerText = "Sync Complete.";
                    statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                    updateHistoryUI(input, avg);
                } else {
                    statusText.innerText = "No matching size data found for this street.";
                    statusDot.className = "w-2 h-2 rounded-full bg-orange-500";
                }

            } catch (err) {
                statusText.innerText = err.message;
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
