<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>£PER v14 — Property Intelligence Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- MapLibre -->
  <link
    href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    #map {
      width: 100%;
      height: 260px;
      border-radius: 8px;
      overflow: hidden;
    }

    #epc-summary {
      padding: 12px;
      background: #fafafa;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    #search-bar {
      padding: 16px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    #search-form {
      display: flex;
      gap: 8px;
    }

    #postcode-input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    section {
      padding: 16px;
      background: white;
      margin-top: 12px;
      border-top: 1px solid #ddd;
    }

    h2 {
      margin-top: 0;
    }

    .ppi-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ppi-table th,
    .ppi-table td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    .card {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    #status {
      padding: 12px;
      text-align: center;
      background: #fff8d6;
      border-top: 1px solid #ddd;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      header {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- Search Bar -->
  <div id="search-bar">
    <form id="search-form">
      <input id="postcode-input" placeholder="Enter postcode…" />
      <button type="submit">Scan</button>
    </form>
  </div>

  <!-- Header: Map + EPC Summary -->
  <header>
    <div id="map"></div>
    <div id="epc-summary"></div>
  </header>

  <!-- Market Evidence -->
  <section>
    <h2>Market Evidence</h2>
    <div id="market-evidence"></div>
  </section>

  <!-- Schools -->
  <section>
    <h2>Education</h2>
    <div id="schools"></div>
  </section>

  <!-- Utilities -->
  <section>
    <h2>Utilities</h2>
    <div id="utilities"></div>
  </section>

  <!-- Environmental Risk -->
  <section>
    <h2>Environmental Risk</h2>
    <div id="risk"></div>
  </section>

  <!-- Status -->
  <div id="status">Ready</div>

  <!-- App -->
  <script type="module" src="./app.js?v=25"></script>
</body>
</html>
