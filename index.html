<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>£PER | Asset Audit v11.19</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="app.js" defer></script>
    <style>
        body { background: #05070a; color: #a1a7b3; font-family: ui-monospace, monospace; }
        .audit-panel { background: #0c0e12; border: 1px solid #1a1e26; }
    </style>
</head>
<body class="p-6">
    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-10 border-b border-gray-900 pb-4">
        <span class="font-black text-white italic">£PER v11.19</span>
        <div class="flex items-center gap-2 text-[10px]">
            <span id="statusText">SYSTEM_READY</span>
            <div id="statusDot" class="w-1.5 h-1.5 bg-gray-700 rounded-full"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto space-y-6">
        <section class="max-w-3xl mx-auto text-center py-10">
            <div class="flex gap-2">
                <input type="text" id="mainInput" placeholder="POSTCODE..." class="flex-grow p-4 bg-black border border-gray-800 text-white outline-none">
                <button onclick="handleDiscovery()" class="bg-white text-black px-10 font-black text-xs">SCAN</button>
            </div>
            <div id="addressSelectorContainer" class="hidden mt-2 p-1 bg-blue-900/10 border border-blue-900/30">
                <select id="addressDropdown" onchange="selectAddress()" class="w-full p-3 text-xs bg-black text-white outline-none"></select>
            </div>
        </section>

        <section id="dashboard" class="hidden space-y-6">
            <div class="audit-panel p-8 flex justify-between items-center">
                <div class="space-y-2">
                    <h2 id="displayAddress" class="text-3xl font-black text-white leading-none">--</h2>
                    <div class="text-[10px] flex gap-6">
                        <span>UPRN: <span id="displayUprn" class="text-blue-500">--</span></span>
                        <span>INTERNAL_SIZE: <span id="sqftMetric" class="text-white font-bold">--</span></span>
                    </div>
                </div>
                <div id="epcBadge" class="text-5xl font-black bg-white text-black px-10 py-6">?</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="audit-panel p-6 col-span-1">
                    <div class="text-[10px] font-bold text-gray-600 border-b border-gray-900 pb-2 mb-4">LOCAL_EDUCATION</div>
                    <div id="schoolList" class="space-y-3"></div>
                </div>
                <div class="audit-panel col-span-2 overflow-hidden">
                    <div class="p-4 border-b border-gray-900 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-gray-600 uppercase">10-Property Market Feed</span>
                        <span id="valMetric" class="text-[10px] text-green-500 font-bold tracking-tighter">--</span>
                    </div>
                    <table class="w-full text-left text-[11px]">
                        <thead class="text-gray-600 bg-black/40">
                            <tr>
                                <th class="p-4">DATE</th>
                                <th class="p-4">ADDRESS</th>
                                <th class="p-4 text-center">EST_SIZE</th>
                                <th class="p-4 text-right">PRICE</th>
                            </tr>
                        </thead>
                        <tbody id="marketBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
