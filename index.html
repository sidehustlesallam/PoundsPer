<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>£PER v14 — Property Intelligence Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; background: white; border-bottom: 1px solid #ddd; }
    #map { width: 100%; min-height: 120px; border-radius: 8px; border: 1px solid #ddd; padding: 12px; background: #fafafa; }
    #epc-summary { padding: 12px; background: #fafafa; border-radius: 8px; border: 1px solid #ddd; }
    #search-bar { padding: 16px; background: white; border-bottom: 1px solid #ddd; }
    #search-form { display: flex; flex-wrap: wrap; gap: 8px; }
    input, select, button { padding: 10px; font-size: 15px; }
    #postcode-input, #uprn-input { flex: 1; min-width: 180px; }
    #property-picker { margin-top: 10px; width: 100%; }
    section { padding: 16px; background: white; margin-top: 12px; border-top: 1px solid #ddd; }
    h2 { margin-top: 0; }
    #status { padding: 12px; text-align: center; background: #fff8d6; border-top: 1px solid #ddd; font-weight: bold; }
    .mono { white-space: pre-line; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    @media (max-width: 700px) { header { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="search-bar">
    <form id="search-form">
      <input id="postcode-input" placeholder="Postcode (e.g. SW1A 1AA)" />
      <input id="uprn-input" placeholder="or UPRN" />
      <button type="submit">Scan</button>
    </form>
    <select id="property-picker" hidden>
      <option value="">Select EPC address…</option>
    </select>
  </div>

  <header>
    <div id="map"></div>
    <div id="epc-summary"></div>
  </header>

  <section>
    <h2>Market Evidence</h2>
    <div id="market-evidence" class="mono"></div>
  </section>

  <section>
    <h2>Education</h2>
    <div id="schools" class="mono"></div>
  </section>

  <section>
    <h2>Utilities</h2>
    <div id="utilities" class="mono"></div>
  </section>

  <section>
    <h2>Environmental Risk</h2>
    <div id="risk" class="mono"></div>
  </section>

  <div id="status">Ready</div>

  <script type="module" src="./app.js?v=28"></script>
</body>
</html>
